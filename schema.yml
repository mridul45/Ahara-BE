    UserCreds:
      type: object
      description: |-
        Minimal signup serializer:
          - input: email, password
          - validates: unique & well-formed email, password via Django validators
          - creates user with a unique, auto-generated username from email local-part
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    UserDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          nullable: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
          nullable: true
          title: Biography
        gender:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/GenderEnum'
          - $ref: '#/components/schemas/NullEnum'
        city:
          type: string
          readOnly: true
          nullable: true
          title: City of Residence
        state:
          readOnly: true
          nullable: true
          title: Current State
          oneOf:
          - $ref: '#/components/schemas/StateEnum'
          - $ref: '#/components/schemas/NullEnum'
        country:
          type: string
          readOnly: true
          nullable: true
          title: Country of Residence
        birth_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        avatar_url:
          type: string
          readOnly: true
      required:
      - avatar_url
      - bio
      - birth_date
      - city
      - country
      - date_joined
      - email
      - first_name
      - gender
      - id
      - is_active
      - last_name
      - state
      - username
    VerifyOtp:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: integer
      required:
      - email
      - otp
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
